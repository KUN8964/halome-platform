<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - HALOME 光宇开放平台</title>
  <link rel="stylesheet" href="css/theme.css">
  <style>
    * { margin:0; padding:0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-wrapper {
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }
    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border-secondary);
      border-radius: var(--radius-xl);
      padding: 48px 40px;
    }
    .login-brand {
      text-align: center;
      margin-bottom: 40px;
    }
    .login-brand .brand-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--accent-purple), var(--accent-purple-dark));
      border-radius: var(--radius-lg);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin-bottom: 16px;
    }
    .login-brand .brand-name {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 1px;
    }
    .login-brand .brand-sub {
      font-size: 12px;
      color: var(--text-tertiary);
      margin-top: 6px;
    }
    .login-title {
      font-size: 16px;
      font-weight: 500;
      color: var(--text-secondary);
      text-align: center;
      margin-bottom: 32px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-label {
      display: block;
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 8px;
      font-weight: 500;
    }
    .form-input {
      width: 100%;
      height: 44px;
      padding: 0 14px;
      font-size: 15px;
      background: var(--bg-input);
      border: 1px solid var(--border-input);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      outline: none;
      transition: border-color var(--transition-fast);
    }
    .form-input:focus {
      border-color: var(--accent-purple);
    }
    .form-input::placeholder {
      color: var(--text-tertiary);
    }
    .sms-row {
      display: flex;
      gap: 10px;
    }
    .sms-row .form-input {
      flex: 1;
    }
    .sms-btn {
      height: 44px;
      padding: 0 18px;
      border: 1px solid var(--accent-purple);
      border-radius: var(--radius-md);
      background: transparent;
      color: var(--accent-purple);
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      transition: all var(--transition-fast);
      min-width: 110px;
    }
    .sms-btn:hover:not(:disabled) {
      background: rgba(139, 92, 246, 0.1);
    }
    .sms-btn:disabled {
      border-color: var(--border-input);
      color: var(--text-muted);
      cursor: not-allowed;
    }
    .btn-login {
      width: 100%;
      height: 44px;
      background: var(--accent-purple);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition-fast);
      margin-top: 8px;
    }
    .btn-login:hover {
      background: var(--accent-purple-dark);
    }
    .btn-login:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .login-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: var(--text-tertiary);
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <!-- 品牌区 -->
      <div class="login-brand">
        <div class="brand-icon">◈</div>
        <div class="brand-name">HALOME 光宇</div>
        <div class="brand-sub">开放平台</div>
      </div>

      <div class="login-title">手机验证码登录 / 注册</div>

      <!-- 手机号 -->
      <div class="form-group">
        <label class="form-label">手机号</label>
        <input type="tel" class="form-input" id="phone" placeholder="请输入手机号" maxlength="11" autocomplete="tel">
        <div class="form-error" id="phone-error">请输入正确的手机号</div>
      </div>

      <!-- 验证码 -->
      <div class="form-group">
        <label class="form-label">验证码</label>
        <div class="sms-row">
          <input type="text" class="form-input" id="code" placeholder="请输入验证码" maxlength="6" autocomplete="one-time-code">
          <button class="sms-btn" id="sms-btn">获取验证码</button>
        </div>
        <div class="form-error" id="code-error">请输入验证码</div>
      </div>

      <!-- 登录按钮 -->
      <button class="btn-login" id="login-btn">登 录</button>

      <!-- 底部提示 -->
      <div class="login-footer">
        首次登录将自动注册
      </div>
    </div>
  </div>

  <!-- Toast 容器 -->
  <div class="toast-container" id="toast-container"></div>

  <script src="js/auth.js"></script>
  <script>
    (function() {
      'use strict';

      var countdown = 0;
      var timer = null;

      // ── Toast 提示 ──────────────────────────────
      function showToast(msg, type) {
        var container = document.getElementById('toast-container');
        var toast = document.createElement('div');
        type = type || 'info';
        var icon = { success: '✓', error: '✕', info: 'ℹ' }[type] || '';
        toast.className = 'toast ' + type;
        toast.innerHTML = '<span>' + icon + '</span><span>' + msg + '</span>';
        container.appendChild(toast);
        setTimeout(function () {
          toast.style.opacity = '0';
          toast.style.transform = 'translateX(20px)';
          setTimeout(function () { toast.remove(); }, 300);
        }, 2500);
      }

      // ── 表单错误提示 ────────────────────────────
      function hideError(id) {
        var el = document.getElementById(id);
        if (el) el.classList.remove('show');
      }
      function showError(id) {
        var el = document.getElementById(id);
        if (el) el.classList.add('show');
      }

      // ── 发送验证码（异步） ──────────────────────
      document.getElementById('sms-btn').addEventListener('click', function() {
        if (countdown > 0) return;

        var phone = document.getElementById('phone').value.trim();
        hideError('phone-error');

        if (!/^1[3-9]\d{9}$/.test(phone)) {
          showError('phone-error');
          return;
        }

        // 禁用按钮，开始倒计时
        var btn = document.getElementById('sms-btn');
        btn.disabled = true;
        countdown = 60;
        updateSmsBtn();

        timer = setInterval(function () {
          countdown--;
          updateSmsBtn();
          if (countdown <= 0) {
            clearInterval(timer);
            timer = null;
            btn.disabled = false;
          }
        }, 1000);

        // 调用后端 API 发送验证码
        window.sendSmsCode(phone)
          .then(function(res) {
            if (res.success) {
              var tip = '验证码已发送至 ' + phone.substring(0, 3) + '****' + phone.substring(7);
              // 开发模式下显示验证码（方便测试）
              if (res.dev_code) {
                tip += '（开发模式，验证码：' + res.dev_code + '）';
              }
              showToast(tip, 'info');
            } else {
              showToast(res.message || '发送失败', 'error');
              // 发送失败，重置倒计时
              clearInterval(timer);
              timer = null;
              countdown = 0;
              btn.disabled = false;
              updateSmsBtn();
            }
          })
          .catch(function() {
            showToast('网络错误，请稍后重试', 'error');
            clearInterval(timer);
            timer = null;
            countdown = 0;
            btn.disabled = false;
            updateSmsBtn();
          });
      });

      function updateSmsBtn() {
        var btn = document.getElementById('sms-btn');
        if (countdown > 0) {
          btn.textContent = countdown + 's 后重发';
        } else {
          btn.textContent = '获取验证码';
        }
      }

      // ── 登录（异步） ────────────────────────────
      document.getElementById('login-btn').addEventListener('click', function() {
        var phone = document.getElementById('phone').value.trim();
        var code = document.getElementById('code').value.trim();
        var valid = true;

        hideError('phone-error');
        hideError('code-error');

        if (!/^1[3-9]\d{9}$/.test(phone)) {
          showError('phone-error');
          valid = false;
        }
        if (!code) {
          showError('code-error');
          valid = false;
        }
        if (!valid) return;

        // 禁用登录按钮，防止重复提交
        var btn = document.getElementById('login-btn');
        btn.disabled = true;
        btn.textContent = '登录中...';

        window.login(phone, code)
          .then(function(res) {
            if (res.success) {
              showToast(res.message || '登录成功', 'success');
              setTimeout(function() {
                window.location.href = 'index.html';
              }, 800);
            } else {
              showToast(res.message || '登录失败', 'error');
              btn.disabled = false;
              btn.textContent = '登 录';
            }
          })
          .catch(function() {
            showToast('网络错误，请稍后重试', 'error');
            btn.disabled = false;
            btn.textContent = '登 录';
          });
      });

      // ── 回车键提交 ──────────────────────────────
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
          document.getElementById('login-btn').click();
        }
      });

      // ── 输入时清除错误状态 ──────────────────────
      document.getElementById('phone').addEventListener('input', function() {
        hideError('phone-error');
      });
      document.getElementById('code').addEventListener('input', function() {
        hideError('code-error');
      });

      // ── 自动聚焦 ────────────────────────────────
      document.getElementById('phone').focus();
    })();
  </script>
    <script src="js/modal.js"></script>
  </body>
</html>
