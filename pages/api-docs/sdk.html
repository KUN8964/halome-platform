<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SDK 快速集成 - HALOME 光宇开放平台</title>
  <link rel="stylesheet" href="../../css/theme.css">
  <style>
    .api-doc-page .page-header {
      margin-bottom: 32px;
    }
    .api-doc-page .page-header h2 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .api-doc-page .page-header .breadcrumb {
      font-size: 12px;
      color: var(--text-muted);
    }
    .api-doc-page .page-header .breadcrumb a {
      color: var(--text-link);
      text-decoration: none;
    }
    .api-doc-content h3 {
      font-size: 17px;
      font-weight: 600;
      margin: 28px 0 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border-secondary);
    }
    .api-doc-content h4 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      margin: 24px 0 10px;
    }
    .api-doc-content h5 {
      font-size: 14px;
      font-weight: 600;
      color: var(--accent-purple-light);
      margin: 20px 0 8px;
    }
    .api-doc-content p {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.8;
      margin: 0 0 12px;
    }
    .api-doc-content strong {
      color: var(--text-primary);
    }
    .api-doc-content em {
      color: var(--text-muted);
      font-style: italic;
    }
    .api-doc-content code {
      background: var(--bg-input);
      padding: 2px 8px;
      border-radius: 4px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 13px;
      color: var(--accent-purple-light);
    }
    .api-doc-content pre {
      background: var(--bg-input);
      border: 1px solid var(--border-secondary);
      border-radius: var(--radius-md);
      padding: 16px 20px;
      overflow-x: auto;
      margin: 12px 0;
    }
    .api-doc-content pre code {
      background: none;
      padding: 0;
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .api-doc-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 12px 0;
      font-size: 13px;
    }
    .api-doc-content th {
      text-align: left;
      padding: 10px 14px;
      background: var(--bg-table-header);
      color: var(--text-primary);
      font-weight: 500;
      border-bottom: 1px solid var(--border-secondary);
      font-size: 13px;
      white-space: nowrap;
    }
    .api-doc-content td {
      padding: 10px 14px;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--border-secondary);
    }
    .api-doc-content tr:hover td {
      background: rgba(139,92,246,0.04);
    }
    .api-doc-content ul, .api-doc-content ol {
      margin: 8px 0;
      padding-left: 24px;
    }
    .api-doc-content li {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.8;
      margin-bottom: 4px;
    }
    .api-doc-content hr {
      border: none;
      border-top: 1px solid var(--border-secondary);
      margin: 24px 0;
    }
    .api-doc-content a {
      color: var(--text-link);
      text-decoration: none;
    }
    .api-doc-content a:hover {
      text-decoration: underline;
    }
    .api-doc-content .endpoint {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--bg-input);
      border: 1px solid var(--border-secondary);
      border-radius: var(--radius-md);
      padding: 8px 14px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 13px;
      color: var(--accent-green);
      margin: 4px 0;
    }
    .method-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: var(--radius-sm);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .method-get { background: rgba(16,185,129,0.15); color: var(--accent-green); }
    .method-post { background: rgba(139,92,246,0.15); color: var(--accent-purple-light); }
    .method-delete { background: rgba(239,68,68,0.15); color: var(--accent-red); }
  </style>
</head>
<body data-page="sdk">
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-wrapper">
      <header class="top-header">
        <div class="header-actions">
          <button class="header-btn" title="用户">👤</button>
          <button class="header-btn" title="退出">↪</button>
        </div>
      </header>
      <main class="content-area api-doc-page">
        <div class="page-header">
          <div class="breadcrumb">
            <a href="../../index.html">首页</a> &rsaquo; 资源中心 &rsaquo; API文档
          </div>
          <h2>SDK 快速集成</h2>
        </div>
        <div class="card">
          <div class="api-doc-content">
            <h3>GuangYuYun Go SDK 地址：<a href="https://github.com/HalomeOS/go-sdk" title="go-sdk" target="_blank" rel="noopener">Go-SDK</a></h3>
<h3>GuangYuYun Java SDK 地址：<a href="https://github.com/HalomeOS/java-sdk" title="java-sdk" target="_blank" rel="noopener">Java-SDK</a></h3>
<h3>GuangYuYun C# .net SDK 地址：<a href="https://github.com/HalomeOS/dotnet-sdk" title="dotnet-sdk" target="_blank" rel="noopener">dotnet-sdk</a></h3>
<h3>GuangYuYun php SDK 地址：<a href="https://github.com/HalomeOS/php-sdk" title="php-sdk" target="_blank" rel="noopener">php-sdk</a></h3>
<h3>GuangYuYun python SDK 地址：<a href="https://github.com/HalomeOS/python-sdk" title="python-sdk" target="_blank" rel="noopener">python-sdk</a></h3>
          </div>
        </div>
      </main>
    </div>
  </div>
  <script src="../../js/sidebar.js"></script>
  <script src="../../js/auth.js"></script>
  <script>checkAuth();</script>
</body>
</html>
