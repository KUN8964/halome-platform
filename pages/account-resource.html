<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>资源用量 - HALOME 光宇开放平台</title>
  <link rel="stylesheet" href="../css/theme.css">
  <style>
    .resource-page .page-title { margin-bottom: 8px; }
    .resource-page .page-subtitle { margin-bottom: 32px; }

    /* Stats grid */
    .resource-stats {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 20px;
      margin-bottom: 32px;
    }
    .resource-stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border-secondary);
      border-radius: var(--radius-lg);
      padding: 20px;
    }
    .resource-stat-card .stat-label { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
    .resource-stat-card .stat-value { font-size: 20px; font-weight: 600; }
    .resource-stat-card .stat-unit { font-size: 12px; color: var(--text-muted); font-weight: 400; margin-left: 4px; }

    /* Cost section */
    .cost-section {
      background: var(--bg-card);
      border: 1px solid var(--border-secondary);
      border-radius: var(--radius-lg);
      padding: 24px;
      margin-bottom: 32px;
    }
    .cost-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .cost-title { font-size: 16px; font-weight: 600; }
    .cost-amount { font-size: 24px; font-weight: 600; color: var(--accent-purple-light); }
    .cost-amount .cost-currency { font-size: 14px; color: var(--text-muted); font-weight: 400; }
    .cost-legend {
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
    }

    /* Bar chart */
    .chart-with-axis {
      display: flex;
      gap: 8px;
    }
    .y-axis {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text-tertiary);
      padding: 4px 0;
      text-align: right;
      min-width: 50px;
    }
    .chart-area { flex: 1; }
    .bar-chart {
      height: 180px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 4px;
    }
    .bar-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      height: 100%;
      justify-content: flex-end;
    }
    .bar-segment {
      width: 100%;
      max-width: 32px;
      border-radius: 2px 2px 0 0;
    }
    .x-axis-labels {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text-tertiary);
      margin-top: 10px;
    }

    .month-selector {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border: 1px solid var(--border-primary);
      border-radius: var(--radius-md);
      font-size: 13px;
      color: var(--text-secondary);
      background: transparent;
      cursor: pointer;
    }
  </style>
</head>
<body data-page="account-resource">
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-wrapper">
      <header class="top-header">
        <div class="header-actions">
          <button class="header-btn" title="用户">👤</button>
          <button class="header-btn" title="退出">↪</button>
        </div>
      </header>
      <main class="content-area resource-page">
        <h1 class="page-title">资源用量</h1>
        <p class="page-subtitle">查看您的资源使用情况和消费明细</p>

        <!-- 资源统计 -->
        <div class="resource-stats">
          <div class="resource-stat-card">
            <div class="stat-label">存储统计</div>
            <div class="stat-value">539.1<span class="stat-unit">MB</span></div>
          </div>
          <div class="resource-stat-card">
            <div class="stat-label">取回统计</div>
            <div class="stat-value">123.3<span class="stat-unit">MB</span></div>
          </div>
          <div class="resource-stat-card">
            <div class="stat-label">AI模型部署数</div>
            <div class="stat-value">3<span class="stat-unit">/5</span></div>
          </div>
          <div class="resource-stat-card">
            <div class="stat-label">本月费用</div>
            <div class="stat-value">¥1,355.69</div>
          </div>
          <div class="resource-stat-card">
            <div class="stat-label">余额</div>
            <div class="stat-value">¥355.69</div>
          </div>
        </div>

        <!-- 成本构成 -->
        <div class="cost-section">
          <div class="cost-header">
            <div>
              <div class="cost-title">成本构成</div>
              <div style="font-size:13px;color:var(--text-muted);margin-top:4px;">消费金额</div>
              <div class="cost-amount">¥ 1,355.69 <span class="cost-currency">CNY</span></div>
            </div>
            <button class="month-selector">2025-10月 ▼</button>
          </div>
          <div class="cost-legend">
            <div class="legend-item"><div class="legend-dot" style="background:#6366f1"></div>存储</div>
            <div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div>取回</div>
            <div class="legend-item"><div class="legend-dot" style="background:#10b981"></div>AI推理</div>
            <div class="legend-item"><div class="legend-dot" style="background:#8b5cf6"></div>存证</div>
          </div>
          <div class="chart-with-axis">
            <div class="y-axis">
              <span>¥1,500</span>
              <span>¥1,000</span>
              <span>¥500</span>
              <span>¥0</span>
            </div>
            <div class="chart-area">
              <div class="bar-chart">
                <div class="bar-col">
                  <div class="bar-segment" style="height:30%;background:#8b5cf6"></div>
                  <div class="bar-segment" style="height:25%;background:#10b981"></div>
                  <div class="bar-segment" style="height:20%;background:#3b82f6"></div>
                  <div class="bar-segment" style="height:15%;background:#6366f1"></div>
                </div>
                <div class="bar-col">
                  <div class="bar-segment" style="height:35%;background:#8b5cf6"></div>
                  <div class="bar-segment" style="height:30%;background:#10b981"></div>
                  <div class="bar-segment" style="height:22%;background:#3b82f6"></div>
                  <div class="bar-segment" style="height:18%;background:#6366f1"></div>
                </div>
                <div class="bar-col">
                  <div class="bar-segment" style="height:25%;background:#8b5cf6"></div>
                  <div class="bar-segment" style="height:20%;background:#10b981"></div>
                  <div class="bar-segment" style="height:15%;background:#3b82f6"></div>
                  <div class="bar-segment" style="height:12%;background:#6366f1"></div>
                </div>
                <div class="bar-col">
                  <div class="bar-segment" style="height:40%;background:#8b5cf6"></div>
                  <div class="bar-segment" style="height:32%;background:#10b981"></div>
                  <div class="bar-segment" style="height:28%;background:#3b82f6"></div>
                  <div class="bar-segment" style="height:20%;background:#6366f1"></div>
                </div>
                <div class="bar-col">
                  <div class="bar-segment" style="height:28%;background:#8b5cf6"></div>
                  <div class="bar-segment" style="height:22%;background:#10b981"></div>
                  <div class="bar-segment" style="height:18%;background:#3b82f6"></div>
                  <div class="bar-segment" style="height:14%;background:#6366f1"></div>
                </div>
                <div class="bar-col">
                  <div class="bar-segment" style="height:35%;background:#8b5cf6"></div>
                  <div class="bar-segment" style="height:28%;background:#10b981"></div>
                  <div class="bar-segment" style="height:24%;background:#3b82f6"></div>
                  <div class="bar-segment" style="height:16%;background:#6366f1"></div>
                </div>
                <div class="bar-col">
                  <div class="bar-segment" style="height:45%;background:#8b5cf6"></div>
                  <div class="bar-segment" style="height:38%;background:#10b981"></div>
                  <div class="bar-segment" style="height:30%;background:#3b82f6"></div>
                  <div class="bar-segment" style="height:22%;background:#6366f1"></div>
                </div>
              </div>
              <div class="x-axis-labels">
                <span>10-1</span>
                <span>10-7</span>
                <span>10-31</span>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="../js/sidebar.js"></script>
  <script src="../js/auth.js"></script>
  <script>checkAuth();</script>
</body>
</html>
